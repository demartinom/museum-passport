services:
  client:
    build: ./client
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - API_URL=http://backend:3001
    depends_on:
      - backend
  backend:
    build: ./server
    ports:
      - "3001:3001"
    env_file:
      - ./server/.env
    environment:
      - DOCKER_ENV=true
